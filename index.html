<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4YAPPS | متجر التطبيقات</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Cairo', sans-serif; background: #020617; color: white; margin: 0; overflow-x: hidden; }
        
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        #loginGate {
            background: linear-gradient(-45deg, #020617, #1e1b4b, #1e3a8a, #020617);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
            display: none;
        }

        .glass-card {
            background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px);
            border: 1px solid rgba(59, 130, 246, 0.1); border-radius: 28px;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glass-card:hover { transform: translateY(-8px); border-color: #3b82f6; box-shadow: 0 15px 30px rgba(59, 130, 246, 0.3); }
        
        .app-icon-container {
            width: 100%; aspect-ratio: 1 / 1;
            border-radius: 22%; overflow: hidden;
            margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.1);
            background: #0f172a;
        }
        .app-icon-container img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }

        #appDetailsModal { position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(10px); }
        .download-gradient { background: linear-gradient(135deg, #3b82f6, #1d4ed8); }
        
        .fade-in { animation: fadeIn 0.8s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

    <div id="loginGate" class="fixed inset-0 z-[1100] flex items-center justify-center">
        <div class="text-center w-full max-w-xs p-6 fade-in">
            <h1 class="text-7xl font-black mb-10 italic tracking-tighter text-white drop-shadow-2xl">4Y<span class="text-blue-500">APPS</span></h1>
            <div class="space-y-4">
                <input type="text" id="usernameInput" placeholder="اسمك" 
                       class="w-full p-4 rounded-2xl bg-white/5 border border-white/10 text-center text-white placeholder-white/40 outline-none focus:border-blue-500 transition-all backdrop-blur-xl">
                <button onclick="accessApp()" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-2xl font-black text-xl shadow-2xl transition-transform active:scale-95">دخول</button>
            </div>
        </div>
    </div>

    <div id="mainApp" class="hidden min-h-screen flex flex-col">
        <header class="p-4 lg:px-12 flex justify-between items-center sticky top-0 bg-[#020617]/80 backdrop-blur-lg z-50 border-b border-white/5">
            <h2 class="text-3xl font-black italic tracking-tighter">4Y<span class="text-blue-500">APPS</span></h2>
            <div class="flex items-center gap-3 bg-slate-900/50 p-1 rounded-full border border-slate-800 pr-4">
                <span id="displayUserName" class="text-sm font-bold opacity-70"></span>
                <div id="userInitials" class="w-10 h-10 rounded-full bg-blue-600 flex items-center justify-center font-black text-xs"></div>
            </div>
        </header>

        <main class="p-6 lg:p-12 max-w-7xl mx-auto w-full flex-grow">
            <div class="mb-10 flex items-center gap-4">
                <div class="h-8 w-1.5 bg-blue-600 rounded-full shadow-[0_0_15px_#3b82f6]"></div>
                <h3 class="text-2xl font-black italic uppercase">قائمة التطبيقات</h3>
            </div>
            
            <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6" id="appsGrid"></div>
        </main>

        <footer class="p-10 text-center border-t border-white/5 opacity-50">
            <p class="text-sm font-black">4YAPPS © Developed By <span class="text-blue-500">Touileb</span></p>
        </footer>
    </div>

    <div id="appDetailsModal">
        <div class="glass-card max-w-sm w-full p-8 relative border-blue-500/30">
            <button onclick="closeModal()" class="absolute top-4 left-4 text-gray-400 text-3xl leading-none hover:text-white">&times;</button>
            <div class="flex flex-col items-center text-center">
                <div class="w-28 h-28 app-icon-container shadow-2xl mb-6">
                    <img id="modalIcon" src="">
                </div>
                <h2 id="modalName" class="text-3xl font-black mb-1"></h2>
                <span id="modalCategory" class="text-blue-500 text-xs font-bold uppercase tracking-widest mb-8 block"></span>
                <a id="downloadBtn" href="#" target="_blank" class="download-gradient w-full text-white py-5 rounded-2xl font-black text-center shadow-xl transform active:scale-95 transition-all">تحميل مباشر</a>
            </div>
        </div>
    </div>

    <script>
        // كافة تطبيقاتك الأصلية الـ 13
        const appList = [
            { name: "Mob Control", category: "ألعاب - كاجوال", logo: "https://g.top4top.io/p_37625ab9e0.jpeg", url: "https://files.an1.net/mob-control-mod-3.15.1-an1.com.apk" },
            { name: "Trucks off road", category: "ألعاب - سيارات", logo: "https://h.top4top.io/p_3762scnvi1.jpg", url: "https://files.an1.co/trucks-off-road-mod_1.92.10541-an1.com.apk" },
            { name: "Soccer super star", category: "ألعاب - رياضة", logo: "https://i.top4top.io/p_37628ljdn2.jpeg", url: "https://files.an1.net/soccer-super-star-mod-0.3.65-an1.com.apk" },
            { name: "Brawl stars", category: "ألعاب - قتال", logo: "https://j.top4top.io/p_37624kihr3.png", url: "https://files.an1.co/brawl-stars-mods-66.293-an1.com.apk" },
            { name: "Car Parking 2", category: "ألعاب - محاكاة", logo: "https://i.top4top.io/p_3762exky91.jpg", url: "https://d-e03.winudf.com/b/XAPK/Y29tLm9semhhcy5jYXJwYXJraW5nLm11bHR5cGxheWVyMl8zNzJfYTlkM2E4ZjE?..." },
            { name: "Anger of Stick 5", category: "ألعاب - أكشن", logo: "https://e.top4top.io/p_3762mpqnc0.png", url: "https://d-09.winudf.com/b/XAPK/anBhcmsuQU9TNV8yMTFfOTIwZjhkOGI?..." },
            { name: "Car Driving Sim", category: "ألعاب - سباق", logo: "https://f.top4top.io/p_3762rn5fr1.png", url: "https://d-e02.winudf.com/b/APK/Y29tLmFpbS5yYWNpbmdfNzM3OTRfMTM5OWRkYTI?..." },
            { name: "Euro Truck 2", category: "ألعاب - شاحنات", logo: "https://g.top4top.io/p_3762xtw622.jpeg", url: "https://d-14.winudf.com/b/XAPK/bW9iaWxlLmV0czJ5ZWRlay5nYW1lXzFfMTg2ZWE5NTU?..." },
            { name: "Duolingo", category: "تطبيقات - تعليم", logo: "https://h.top4top.io/p_376270ws63.png", url: "https://d-e03.winudf.com/b/XAPK/Y29tLmR1b2xpbmdvXzIzMzlfYWY4NzllOTI?..." },
            { name: "Ship Captain Pro", category: "ألعاب - محاكاة", logo: "https://i.top4top.io/p_37620m8ct4.jpeg", url: "https://d-21.winudf.com/b/XAPK/Y29tLnJlYWxzaGlwLnNpbXVsYXRvcl8xNV80ZGVjZDJiMw?..." },
            { name: "Shadow Fight 4", category: "ألعاب - قتال", logo: "https://j.top4top.io/p_3762o70zi5.jpg", url: "https://d-11.winudf.com/b/XAPK/Y29tLm5la2tpLnNoYWRvd2ZpZ2h0YXJlbmFfNDEyMl9kODIxMTE2OQ?..." },
            { name: "Clash of Clans", category: "ألعاب - استراتيجية", logo: "https://k.top4top.io/p_37628803z6.jpeg", url: "https://d-e03.winudf.com/b/APK/Y29tLnN1cGVyY2VsbC5jbGFzaG9mY2xhbnNfMTgwMjAwMDI3X2YxNWEzZGM2?..." },
            { name: "CapCut Pro", category: "أدوات - مونتاج", logo: "https://j.top4top.io/p_3762a0so42.jpg", url: "https://file.capatcutz.pro/capcut_mod_apk_latest_version.apk" }
        ];

        function accessApp() {
            const name = document.getElementById('usernameInput').value;
            if(!name) return;
            localStorage.setItem('4yapps_user', name);
            launchApp(name);
        }

        function launchApp(name) {
            document.getElementById('loginGate').style.display = 'none';
            document.getElementById('mainApp').classList.remove('hidden');
            document.getElementById('displayUserName').innerText = name;
            document.getElementById('userInitials').innerText = name.substring(0,1).toUpperCase();
            
            const grid = document.getElementById('appsGrid');
            grid.innerHTML = appList.map((app, index) => `
                <div class="glass-card p-5 flex flex-col items-center text-center cursor-pointer group" onclick="openAppDetails(${index})">
                    <div class="app-icon-container">
                        <img src="${app.logo}" loading="lazy">
                    </div>
                    <div class="font-bold text-xs text-white mb-1 line-clamp-1">${app.name}</div>
                    <div class="text-[9px] text-blue-400 font-bold mb-4 uppercase italic tracking-tighter">${app.category}</div>
                    <div class="w-full bg-blue-600/10 text-blue-400 py-2 rounded-xl text-[9px] font-black group-hover:bg-blue-600 group-hover:text-white transition-all uppercase">
                        تنزيل
                    </div>
                </div>
            `).join('');
        }

        function openAppDetails(index) {
            const app = appList[index];
            document.getElementById('modalIcon').src = app.logo;
            document.getElementById('modalName').innerText = app.name;
            document.getElementById('modalCategory').innerText = app.category;
            document.getElementById('downloadBtn').href = app.url;
            document.getElementById('appDetailsModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('appDetailsModal').style.display = 'none';
        }

        window.onload = () => {
            const savedUser = localStorage.getItem('4yapps_user');
            if(savedUser) {
                launchApp(savedUser);
            } else {
                document.getElementById('loginGate').style.display = 'flex';
            }
        };
    </script>
</body>
</html>
